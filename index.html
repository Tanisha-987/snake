<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score :
                        <span id="high-score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Score :
                        <span id="score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Time:
                        <span id="time">00:00</span>
                    </h3>
                </div>
            </div>
            <div class="board"></div>
        </section>

        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the Snake Game</h3>
                <button class="btn btn-start">Start Game</button>
            </div>
            <div class="game-type">
                <h3>Select the type of Game</h3>
                <div class="game-type-btn">
                    <button class="btn btn-easy">Easy</button>
                    <button class="btn btn-medium">Medium</button>
                    <button class="btn btn-hard">Hard</button>
                </div>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>
    </main>


</body>
</html>
